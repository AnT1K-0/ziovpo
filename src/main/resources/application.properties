spring.application.name=secure-server

spring.datasource.url=jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

server.port=8443
server.ssl.enabled=true
server.ssl.key-store=${SSL_KEYSTORE_PATH:certs/keystore.p12}
server.ssl.key-store-password=${SSL_KEYSTORE_PASSWORD}
server.ssl.key-store-type=PKCS12
server.ssl.key-alias=secure-server

server.error.include-message=always
server.error.include-binding-errors=always

app.jwt.secret=${APP_JWT_SECRET}
app.jwt.access-token-expiration-ms=900000
app.jwt.refresh-token-expiration-ms=604800000

signature.enabled=true
signature.algorithm=SHA256withRSA
signature.key-store-path=${SIGNATURE_KEYSTORE_PATH:classpath:signing.jks}
signature.key-store-type=JKS
signature.key-store-password=${SIGNATURE_KEYSTORE_PASSWORD:changeit}
signature.key-alias=${SIGNATURE_KEY_ALIAS:app-signing}
signature.key-password=${SIGNATURE_KEY_PASSWORD:changeit}